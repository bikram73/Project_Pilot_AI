[build]
  # Super simple build command
  command = "npm run build:netlify"
  # Directory to publish
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify Functions
[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# API routes redirection to Netlify Functions
[[redirects]]
  from = "/api/analyze/latest"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/test-lemma"
  to = "/.netlify/functions/test-lemma"
  status = 200

[[redirects]]
  from = "/api/chat/mode"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/chat/availability"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/tasks"
  to = "/.netlify/functions/tasks"
  status = 200

[[redirects]]
  from = "/api/risks"
  to = "/.netlify/functions/risks"
  status = 200

[[redirects]]
  from = "/api/summary"
  to = "/.netlify/functions/summary"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index-netlify.html"
  status = 200

# CORS headers for API
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"