[build]
  # Use a simpler build command to avoid Tailwind native binding issues
  command = "rm -rf node_modules package-lock.json && npm install && npm run build:netlify"
  # Directory to publish (Vite builds to 'dist')
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  # Environment variables for Netlify build
  npm_config_legacy_peer_deps = "true"

# Netlify Functions (Serverless functions for API routes)
[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# API routes redirection to Netlify Functions
[[redirects]]
  from = "/api/analyze/latest"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/chat/mode"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/chat/availability"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/tasks"
  to = "/.netlify/functions/tasks"
  status = 200

[[redirects]]
  from = "/api/risks"
  to = "/.netlify/functions/risks"
  status = 200

[[redirects]]
  from = "/api/summary"
  to = "/.netlify/functions/summary"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CORS headers for API
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"